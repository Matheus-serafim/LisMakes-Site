<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>LisMakes</title>
    <meta name="theme-color" content="#8b1e3f" />

    <meta
      name="description"
      content="LisMakes - Loja de maquiagens com batons, gloss, blush, iluminadores e muito mais. Entrega rápida e retirada no local."
    />

    <!-- Ícone -->
    <link
      rel="shortcut icon"
      href="imagem/logo-favicon.png"
      type="image/x-icon"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <!-- Estilos -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- Cabeçalho -->
    <header id="cabeca">
      <img src="imagem/logo-lismakes.png" alt="Logo LisMakes" loading="lazy" />
    </header>

    <!-- Barra fixa -->
    <div id="barra-fixa">
      <div class="menu-pesquisa">
        <button class="btn-menu">
          <i class="fa-solid fa-bars"></i>
        </button>

        <div class="barra-pesquisa">
          <input type="text" placeholder="Digite sua maquiagem..." />
          <button>
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </div>

      <!-- Categorias -->
      <nav class="categorias">
        <ul>
          <li><a href="#" data-categoria="todos">Todos</a></li>
          <li><a href="#" data-categoria="rosto">Rosto</a></li>
          <li><a href="#" data-categoria="olhos">Olhos</a></li>
          <li><a href="#" data-categoria="labios">Lábios</a></li>
        </ul>
      </nav>
    </div>
    <main class="container">
      <div class="produtos-grid" id="produtos-container"></div>
    </main>
    <!-- CARRINHO FLUTUANTE -->
    <button class="carrinho-flutuante">
      🛒 <span class="contador-carrinho">0</span>
    </button>

    <!-- MODAL CARRINHO -->
    <div class="modal-carrinho" id="modal-carrinho">
      <div class="conteudo-carrinho">
        <button class="fechar-carrinho">&times;</button>
        <h2>Meu Carrinho</h2>

        <div class="lista-carrinho"></div>

        <div class="total-carrinho">Total: <span id="total">R$ 0,00</span></div>

        <!-- 🔽 CHECKOUT -->
<div class="checkout-lismakes">
  <h3>Finalizar pedido</h3>

  <input type="text" class="nome-cliente" placeholder="Seu nome" />

  <select class="forma-pagamento">
    <option value="">Forma de pagamento</option>
    <option value="Pix">Pix</option>
  </select>

  <select class="tipo-entrega">
    <option value="retirada">Retirada no local</option>
    <option value="entrega">Entrega</option>
  </select>

  <div class="campo-endereco" style="display: none">
    <input
      type="text"
      class="endereco-entrega"
      placeholder="Rua, número, bairro"
    />
  </div>

  <div class="campo-taxa" style="display: none">
    <input
      type="number"
      class="taxa-entrega"
      value="2.00"
      readonly
    />
  </div>
</div>
<!-- 🔼 CHECKOUT -->

<button class="limpar-carrinho">Limpar carrinho</button>
<button class="finalizar">Finalizar pelo WhatsApp</button>

    <div id="fullscreen">
      <img src="" alt="Produto" />
      <span class="fechar">✕</span>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
